<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anmeldung bestätigt – Core Identity Alignment</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #141414; --mid: #555; --light: #999;
    --gold: #A67C2E; --gold-lt: #C9982E;
    --dark: #0f0f0f; --bg: #faf9f7; --border: #e8e6e2;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    text-align: center;
  }
  .logo-mark {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    margin-bottom: 48px;
  }
  .logo-mark span {
    display: block;
    height: 3px;
    border-radius: 2px;
    background: white;
  }
  .logo-mark span:nth-child(1) { width: 32px; }
  .logo-mark span:nth-child(2) { width: 22px; }
  .logo-mark span:nth-child(3) { width: 10px; background: var(--gold); }
  .check {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
    font-size: 22px;
    color: var(--gold);
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 300;
    line-height: 1.2;
    max-width: 600px;
    margin-bottom: 20px;
  }
  p {
    font-size: 15px;
    color: rgba(255,255,255,0.5);
    max-width: 480px;
    line-height: 1.7;
    margin-bottom: 48px;
  }
  .download-box {
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    padding: 32px 40px;
    max-width: 440px;
    margin-bottom: 40px;
  }
  .download-label {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }
  .download-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    color: white;
    margin-bottom: 20px;
    line-height: 1.4;
  }
  .download-btn {
    display: inline-block;
    background: var(--gold);
    color: white;
    text-decoration: none;
    padding: 14px 28px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    border-radius: 2px;
    transition: background 0.2s;
  }
  .download-btn:hover { background: var(--gold-lt); }
  .back {
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    text-decoration: none;
    letter-spacing: 0.05em;
  }
  .back:hover { color: rgba(255,255,255,0.5); }
</style>
</head>
<body>

  <div class="logo-mark">
    <span></span><span></span><span></span>
  </div>

  <div class="check">✓</div>

  <h1>Dein Platz ist gesichert.</h1>
  <p>Wir freuen uns auf dich. Du erhältst rechtzeitig alle Infos zum Webinar per E-Mail.<br><br>
  Als Vorbereitung — eine Frage, die es in sich hat:</p>

  <div class="download-box">
    <div class="download-label">Dein Lead Magnet</div>
    <div class="download-title">7 Zeichen, dass deine Identitätsstruktur nicht mehr trägt</div>
    <a href="/CIA_Checkliste.pdf" download class="download-btn">Jetzt herunterladen →</a>
  </div>

  <a href="/" class="back">← Zurück zur Seite</a>

</body>
</html>
